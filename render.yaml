services:
  - type: web
    name: telegram-render-bot
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "24.15.0"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENCLAW_GATEWAY_TOKEN
        sync: false
      - key: OPENCLAW_MODEL
        value: openai/gpt-5.6-sol
      - key: OPENCLAW_FALLBACK_MODEL
        value: google/gemini-3.1-pro-preview
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: RENDER_EXTERNAL_URL
        value: https://telegram-render-bot-ir2l.onrender.com
      - key: TELEGRAM_WEBHOOK_PATH
        value: /telegram-webhook
      - key: TELEGRAM_WEBHOOK_LOCAL_PORT
        value: "8787"
      - key: OPENCLAW_GATEWAY_PORT
        value: "18789"
      - key: OPENCLAW_STATE_DIR
        value: /opt/render/project/src/.openclaw-state
      - key: OPENCLAW_WORKSPACE_DIR
        value: /opt/render/project/src/.openclaw-state/workspace
